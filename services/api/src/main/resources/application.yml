spring:
  application:
    name: wibestyle-api
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wibestyle}
    username: ${SPRING_DATASOURCE_USERNAME:wibestyle}
    password: ${SPRING_DATASOURCE_PASSWORD:wibestyle}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
wibestyle:
  mail:
    enabled: ${WIBESTYLE_MAIL_ENABLED:false}
    from: ${WIBESTYLE_MAIL_FROM:noreply@vibestyle.art}
    dev-log-only: ${WIBESTYLE_MAIL_DEV_LOG_ONLY:true}
  sms:
    email: ${WIBESTYLE_SMS_AERO_EMAIL:}
    api-key: ${WIBESTYLE_SMS_AERO_API_KEY:}
    sign: ${WIBESTYLE_SMS_AERO_SIGN:SMS Aero}
    channel: ${WIBESTYLE_SMS_AERO_CHANNEL:DIRECT}
    base-url: ${WIBESTYLE_SMS_AERO_BASE_URL:https://gate.smsaero.ru/v2}
    dev-stub-code: "0000"
  geoip:
    default-country: ${WIBESTYLE_GEOIP_DEFAULT_COUNTRY:}
  auth:
    otp-ttl-seconds: 300
    otp-resend-cooldown-seconds: 60
    otp-max-attempts: 5
    access-token-ttl-seconds: 2592000
    refresh-token-ttl-seconds: 31536000
    refresh-token-store: jdbc
    jwt-secret: ${WIBESTYLE_JWT_SECRET:dev-jwt-secret-change-me-in-production-min-32-chars}
    legacy-access-token-enabled: true
  admin:
    api-key: ${WIBESTYLE_ADMIN_API_KEY:dev-admin-key}
    bootstrap-password: ${WIBESTYLE_ADMIN_BOOTSTRAP_PASSWORD:dev-admin-password}
  oauth:
    web-app-callback-url: ${WIBESTYLE_OAUTH_WEB_CALLBACK:http://localhost:3001/auth/oauth/callback}
    mobile-app-callback-url: ${WIBESTYLE_OAUTH_MOBILE_CALLBACK:wibestyle://auth/oauth/callback}
    api-public-base-url: ${WIBESTYLE_OAUTH_API_PUBLIC_BASE:http://localhost:8080}
    yandex:
      enabled: ${WIBESTYLE_OAUTH_YANDEX_ENABLED:false}
      client-id: ${WIBESTYLE_OAUTH_YANDEX_CLIENT_ID:}
      client-secret: ${WIBESTYLE_OAUTH_YANDEX_CLIENT_SECRET:}
    google:
      enabled: ${WIBESTYLE_OAUTH_GOOGLE_ENABLED:false}
      client-id: ${WIBESTYLE_OAUTH_GOOGLE_CLIENT_ID:}
      client-secret: ${WIBESTYLE_OAUTH_GOOGLE_CLIENT_SECRET:}
  security:
    rate-limit-enabled: true
    otp-start-per-minute: 10
    media-access-ttl-seconds: 900
    max-upload-bytes: 10485760
  billing:
    provider: ${WIBESTYLE_BILLING_PROVIDER:mock}
    subscribe-dev-enabled: ${WIBESTYLE_BILLING_SUBSCRIBE_DEV_ENABLED:true}
    return-url: ${WIBESTYLE_BILLING_RETURN_URL:http://localhost:3001/paywall/return}
    yookassa:
      shop-id: ${WIBESTYLE_YOOKASSA_SHOP_ID:}
      secret-key: ${WIBESTYLE_YOOKASSA_SECRET_KEY:}
      api-base-url: ${WIBESTYLE_YOOKASSA_API_BASE:https://api.yookassa.ru}
    wibe-monthly-rub: 400
    wibe-annual-rub: 3840
    elite-monthly-rub: 900
    elite-annual-rub: 8640
    wibe-generations: 20
    elite-generations: 100
    annual-discount-percent: 20
    annual-rub: 6990
    discounted-annual-rub: 3495
    first-users-limit: 100
  storage:
    backend: ${WIBESTYLE_STORAGE_BACKEND:local}
    # Persistent volume root (local/Coolify). Override: WIBESTYLE_STORAGE_ROOT=/data/wibestyle-media
    # Leave unset locally — StorageRootResolver finds wibestyle/data/storage via data/storage/.gitkeep
    root: ${WIBESTYLE_STORAGE_ROOT:}
  features:
    flags:
      videoTryOn: true
      multiItemTryOn: false
      search: true
      sizeAdvisory: true
      eliteFrame: false
      futureStylist: false
      futureMakeup: false
      futureHairstyle: false

  ai:
    enabled: ${WIBESTYLE_AI_ENABLED:false}
    base-url: ${WIBESTYLE_AI_BASE_URL:http://localhost:8091}
    api-key: ${WIBESTYLE_AI_API_KEY:}
    fallback-to-demo: ${WIBESTYLE_AI_FALLBACK_TO_DEMO:false}
    async-enabled: ${WIBESTYLE_AI_ASYNC_ENABLED:true}
    timeout-seconds: ${WIBESTYLE_AI_TIMEOUT_SECONDS:180}
    virtual-try-on-network: ${WIBESTYLE_AI_TRYON_NETWORK:wibestyle-vton}
    season-video-network: ${WIBESTYLE_AI_SEASON_VIDEO_NETWORK:wibestyle-season-video}
    size-compliment-network: ${WIBESTYLE_AI_SIZE_COMPLIMENT_NETWORK:gpt-4o-mini}
    webhook-secret: ${WIBESTYLE_AI_WEBHOOK_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
