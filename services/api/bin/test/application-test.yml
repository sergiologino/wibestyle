spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
  datasource:
    url: jdbc:h2:mem:wibestyle;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379

wibestyle:
  mail:
    dev-log-only: true
  auth:
    otp-ttl-seconds: 300
    otp-dev-fixed-code: "123456"
    jwt-secret: test-jwt-secret-with-enough-length-for-hmac-sha256
  oauth:
    google:
      enabled: true
      client-id: test-google-client-id
      client-secret: test-google-client-secret
    yandex:
      enabled: true
      client-id: test-yandex-client-id
      client-secret: test-yandex-client-secret
  admin:
    api-key: test-admin-key
  storage:
    root: ${java.io.tmpdir}/wibestyle-test-storage
  security:
    rate-limit-enabled: false
  ai:
    enabled: false
    fallback-to-demo: true
    async-enabled: false
  billing:
    provider: mock
    subscribe-dev-enabled: true
  features:
    flags:
      search: true
      sizeAdvisory: true
